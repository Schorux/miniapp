<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Music Bot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #0f0f13;
  --surface: #1a1a22;
  --surface2: #22222e;
  --accent: #7c6af7;
  --accent2: #a78bfa;
  --text: #f0effe;
  --muted: #6b6880;
  --danger: #e25454;
  --radius: 12px;
  --player-h: 148px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* TABS */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid #ffffff0f;
  flex-shrink: 0;
}
.tab {
  flex: 1; padding: 14px 0; text-align: center;
  font-size: 13px; color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .2s, border-color .2s;
}
.tab.active { color: var(--accent2); border-bottom-color: var(--accent); }

/* PAGES */
.pages { flex: 1; overflow: hidden; position: relative; }
.page { position: absolute; inset: 0; overflow-y: auto; display: none; padding-bottom: calc(var(--player-h) + 8px); }
.page.active { display: block; }

/* SEARCH BAR */
.search-wrap {
  padding: 12px;
  position: sticky; top: 0; z-index: 10;
  background: var(--bg);
}
.search-wrap input {
  width: 100%; padding: 11px 14px 11px 40px;
  background: var(--surface); border: 1px solid #ffffff10;
  border-radius: var(--radius); color: var(--text);
  font-size: 15px; outline: none;
}
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute; left: 24px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 17px; pointer-events: none;
}

/* TRACK ITEM */
.track-list { padding: 0 12px; }
.track {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: var(--radius);
  cursor: pointer; transition: background .15s;
}
.track:active, .track:hover { background: var(--surface); }
.track.playing { background: var(--surface2); }
.track.playing .track-title { color: var(--accent2); }
.track-thumb {
  width: 46px; height: 46px; border-radius: 8px;
  background: var(--surface2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; overflow: hidden;
}
.track-thumb img { width: 100%; height: 100%; object-fit: cover; }
.track-meta { flex: 1; min-width: 0; }
.track-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-artist { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-dur { font-size: 12px; color: var(--muted); flex-shrink: 0; }
.track-fav {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; flex-shrink: 0; color: var(--muted); font-size: 18px;
  transition: color .2s; cursor: pointer;
}
.track-fav.active { color: var(--danger); }

/* SECTION LABEL */
.section-label {
  padding: 14px 12px 6px;
  font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: .07em;
}

/* EMPTY STATE */
.empty {
  text-align: center; padding: 60px 24px;
  color: var(--muted);
}
.empty .emoji { font-size: 48px; margin-bottom: 12px; }
.empty p { font-size: 14px; line-height: 1.5; }

/* PLAYER */
.player {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid #ffffff0f;
  padding: 10px 16px 20px;
  height: var(--player-h);
  z-index: 100;
}
.player.hidden { display: none; }
.now-playing { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.np-cover {
  width: 40px; height: 40px; border-radius: 8px;
  background: var(--surface2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 18px; overflow: hidden;
}
.np-cover img { width: 100%; height: 100%; object-fit: cover; }
.np-meta { flex: 1; min-width: 0; }
.np-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-artist { font-size: 12px; color: var(--muted); margin-top: 1px; }
.np-fav { font-size: 20px; cursor: pointer; color: var(--muted); transition: color .2s; }
.np-fav.active { color: var(--danger); }

/* PROGRESS */
.progress { margin-bottom: 8px; }
.progress-bar {
  height: 3px; background: #ffffff15; border-radius: 2px;
  cursor: pointer; position: relative; margin-bottom: 4px;
}
.progress-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  width: 0%; transition: width .5s linear;
}
.progress-times { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }

/* CONTROLS */
.controls { display: flex; align-items: center; justify-content: space-between; }
.ctrl { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 20px; border-radius: 50%; transition: color .2s, background .15s; }
.ctrl:active { background: #ffffff10; }
.play-pause {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 22px; flex-shrink: 0;
  transition: transform .1s, background .2s;
}
.play-pause:active { transform: scale(.94); }

/* LOADER */
.loader { display: flex; gap: 6px; justify-content: center; padding: 24px; }
.loader span { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1s ease-in-out infinite; }
.loader span:nth-child(2) { animation-delay: .15s; }
.loader span:nth-child(3) { animation-delay: .3s; }
@keyframes pulse { 0%,100%{opacity:.3;transform:scale(.7)} 50%{opacity:1;transform:scale(1)} }

/* WAVE TAG */
.wave-tag {
  display: inline-block; padding: 2px 8px; border-radius: 20px;
  background: #7c6af720; color: var(--accent2); font-size: 11px; margin-left: 6px;
}

audio { display: none; }
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('search')">🔍 Поиск</div>
  <div class="tab" onclick="showTab('favorites')">❤️ Избранное</div>
  <div class="tab" onclick="showTab('wave')">🌊 Волна</div>
</div>

<div class="pages">

  <!-- SEARCH -->
  <div class="page active" id="page-search">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="search-input" placeholder="Исполнитель или название..." autocomplete="off"/>
    </div>
    <div id="search-results" class="track-list">
      <div class="empty"><div class="emoji">🎵</div><p>Введи название трека<br>и нажми поиск</p></div>
    </div>
  </div>

  <!-- FAVORITES -->
  <div class="page" id="page-favorites">
    <div class="section-label">Любимые треки</div>
    <div id="favorites-list" class="track-list">
      <div class="loader"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- WAVE -->
  <div class="page" id="page-wave">
    <div class="section-label">Моя Волна <span class="wave-tag">на основе избранного</span></div>
    <div id="wave-list" class="track-list">
      <div class="loader"><span></span><span></span><span></span></div>
    </div>
  </div>

</div>

<!-- PLAYER -->
<div class="player hidden" id="player">
  <div class="now-playing">
    <div class="np-cover" id="np-cover">🎵</div>
    <div class="np-meta">
      <div class="np-title" id="np-title">—</div>
      <div class="np-artist" id="np-artist">—</div>
    </div>
    <div class="np-fav" id="np-fav" onclick="toggleCurrentFav()">🤍</div>
  </div>
  <div class="progress">
    <div class="progress-bar" id="progress-bar" onclick="seekAudio(event)">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-times">
      <span id="time-cur">0:00</span>
      <span id="time-dur">0:00</span>
    </div>
  </div>
  <div class="controls">
    <div class="ctrl" onclick="prevTrack()" title="Назад">⏮</div>
    <div class="ctrl" onclick="shuffleToggle()" id="shuffle-btn" title="Перемешать">🔀</div>
    <div class="play-pause" id="play-pause-btn" onclick="togglePlay()">▶️</div>
    <div class="ctrl" onclick="repeatToggle()" id="repeat-btn" title="Повтор">🔁</div>
    <div class="ctrl" onclick="nextTrack()" title="Вперёд">⏭</div>
  </div>
</div>

<audio id="audio"></audio>

<script>
const BASE = '';
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ─── STATE ───────────────────────────────────────────────────
let queue = [];
let queueIndex = -1;
let currentTrack = null;
let favorites = [];
let isPlaying = false;
let isShuffle = false;
let isRepeat = false;
let searchTimer = null;

const audio = document.getElementById('audio');

// ─── TABS ────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['search','favorites','wave'][i] === name));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + name));
  if (name === 'favorites') loadFavorites();
  if (name === 'wave') loadWave();
}

// ─── SEARCH ──────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (q.length < 2) { document.getElementById('search-results').innerHTML = '<div class="empty"><div class="emoji">🎵</div><p>Введи название трека</p></div>'; return; }
  showLoader('search-results');
  searchTimer = setTimeout(() => doSearch(q), 500);
});

async function doSearch(q) {
  try {
    const r = await fetch(`${BASE}/api/search?q=${encodeURIComponent(q)}`);
    const data = await r.json();
    renderTracks('search-results', data.results, 'search');
  } catch(e) {
    document.getElementById('search-results').innerHTML = '<div class="empty"><div class="emoji">😕</div><p>Ошибка поиска. Попробуй ещё раз.</p></div>';
  }
}

// ─── FAVORITES ───────────────────────────────────────────────
async function loadFavorites() {
  showLoader('favorites-list');
  try {
    const r = await fetch(`${BASE}/api/favorites`);
    const data = await r.json();
    favorites = data.favorites;
    if (!favorites.length) {
      document.getElementById('favorites-list').innerHTML = '<div class="empty"><div class="emoji">🤍</div><p>Пока пусто.<br>Нажимай 🤍 у треков чтобы добавить.</p></div>';
    } else {
      renderTracks('favorites-list', favorites, 'favorites');
    }
  } catch(e) {
    document.getElementById('favorites-list').innerHTML = '<div class="empty"><div class="emoji">😕</div><p>Ошибка загрузки</p></div>';
  }
}

async function toggleFav(track, btn) {
  const isFav = favorites.some(f => f.track_name === track.track_name && f.artist === track.artist);
  if (isFav) {
    const fav = favorites.find(f => f.track_name === track.track_name && f.artist === track.artist);
    if (fav) {
      await fetch(`${BASE}/api/favorites/${fav.id}`, { method: 'DELETE' });
      favorites = favorites.filter(f => f.id !== fav.id);
    }
    if (btn) { btn.textContent = '🤍'; btn.classList.remove('active'); }
  } else {
    const res = await fetch(`${BASE}/api/favorites`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ track_name: track.track_name, artist: track.artist, youtube_url: track.url, thumbnail_url: track.thumbnail, duration: track.duration })
    });
    const data = await res.json();
    if (data.added) {
      favorites.push({ ...track, id: Date.now() });
      if (btn) { btn.textContent = '❤️'; btn.classList.add('active'); }
    }
  }
  updateNpFav();
}

function isFavorite(track) {
  return favorites.some(f => f.track_name === track.track_name && f.artist === track.artist);
}

function toggleCurrentFav() {
  if (!currentTrack) return;
  const btn = document.getElementById('np-fav');
  toggleFav(currentTrack, btn);
  document.querySelectorAll('.track-fav').forEach(b => {
    if (b.dataset.id === currentTrack.id) {
      b.textContent = isFavorite(currentTrack) ? '🤍' : '❤️';
    }
  });
}

function updateNpFav() {
  if (!currentTrack) return;
  const btn = document.getElementById('np-fav');
  const fav = isFavorite(currentTrack);
  btn.textContent = fav ? '❤️' : '🤍';
  btn.classList.toggle('active', fav);
}

// ─── WAVE ────────────────────────────────────────────────────
async function loadWave() {
  showLoader('wave-list');
  try {
    const r = await fetch(`${BASE}/api/wave`);
    const data = await r.json();
    if (!data.tracks.length) {
      document.getElementById('wave-list').innerHTML = '<div class="empty"><div class="emoji">🌊</div><p>' + (data.message || 'Добавь треки в избранное!') + '</p></div>';
    } else {
      const label = data.based_on ? `<div class="section-label" style="padding-top:0">Основано на: ${data.based_on.join(', ')}</div>` : '';
      document.getElementById('wave-list').innerHTML = label;
      renderTracks('wave-list', data.tracks, 'wave', true);
    }
  } catch(e) {
    document.getElementById('wave-list').innerHTML = '<div class="empty"><div class="emoji">😕</div><p>Ошибка загрузки</p></div>';
  }
}

// ─── RENDER TRACKS ───────────────────────────────────────────
function renderTracks(containerId, tracks, context, append = false) {
  const container = document.getElementById(containerId);
  if (!tracks.length) {
    container.innerHTML = '<div class="empty"><div class="emoji">😕</div><p>Ничего не найдено</p></div>';
    return;
  }
  const html = tracks.map((t, i) => {
    const fav = isFavorite(t);
    const thumb = t.thumbnail
      ? `<img src="${t.thumbnail}" alt="" loading="lazy" onerror="this.parentNode.textContent='🎵'"/>`
      : '🎵';
    return `
    <div class="track ${currentTrack && currentTrack.id === t.id ? 'playing' : ''}" onclick="playTrack(${JSON.stringify(JSON.stringify(t))}, '${context}', ${i})">
      <div class="track-thumb">${thumb}</div>
      <div class="track-meta">
        <div class="track-title">${esc(t.track_name || t.title)}</div>
        <div class="track-artist">${esc(t.artist)}</div>
      </div>
      <div class="track-dur">${t.duration || ''}</div>
      <div class="track-fav ${fav ? 'active' : ''}" data-id="${t.id}" onclick="event.stopPropagation();toggleFav(${JSON.stringify(JSON.stringify(t))}, this)">${fav ? '❤️' : '🤍'}</div>
    </div>`;
  }).join('');
  if (append) container.insertAdjacentHTML('beforeend', html);
  else container.innerHTML = html;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── PLAYER ──────────────────────────────────────────────────
async function playTrack(trackJson, context, index) {
  const track = JSON.parse(trackJson);
  currentTrack = track;
  queueIndex = index;

  // Update UI
  document.getElementById('np-title').textContent = track.track_name || track.title;
  document.getElementById('np-artist').textContent = track.artist;
  const cover = document.getElementById('np-cover');
  cover.innerHTML = track.thumbnail ? `<img src="${track.thumbnail}" onerror="this.parentNode.textContent='🎵'"/>` : '🎵';
  document.getElementById('player').classList.remove('hidden');
  document.getElementById('play-pause-btn').textContent = '⏸️';
  updateNpFav();
  markPlaying(track.id);

  // Load audio
  const videoId = track.id;
  audio.src = `${BASE}/api/download/${videoId}`;
  audio.load();
  try { await audio.play(); isPlaying = true; } catch(e) { console.error(e); }
}

function togglePlay() {
  if (!currentTrack) return;
  if (audio.paused) { audio.play(); isPlaying = true; document.getElementById('play-pause-btn').textContent = '⏸️'; }
  else { audio.pause(); isPlaying = false; document.getElementById('play-pause-btn').textContent = '▶️'; }
}

function nextTrack() {
  if (isShuffle) { queueIndex = Math.floor(Math.random() * queue.length); }
  else { queueIndex = (queueIndex + 1) % queue.length; }
  if (queue[queueIndex]) playTrack(JSON.stringify(queue[queueIndex]), '', queueIndex);
}

function prevTrack() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  queueIndex = (queueIndex - 1 + queue.length) % queue.length;
  if (queue[queueIndex]) playTrack(JSON.stringify(queue[queueIndex]), '', queueIndex);
}

function shuffleToggle() {
  isShuffle = !isShuffle;
  document.getElementById('shuffle-btn').style.color = isShuffle ? 'var(--accent2)' : '';
}

function repeatToggle() {
  isRepeat = !isRepeat;
  document.getElementById('repeat-btn').style.color = isRepeat ? 'var(--accent2)' : '';
}

function seekAudio(e) {
  if (!audio.duration) return;
  const bar = document.getElementById('progress-bar');
  const rect = bar.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  audio.currentTime = ratio * audio.duration;
}

function markPlaying(id) {
  document.querySelectorAll('.track').forEach(el => {
    el.classList.toggle('playing', el.querySelector('.track-title') && currentTrack && el.onclick?.toString().includes(id));
  });
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('time-cur').textContent = formatTime(audio.currentTime);
  document.getElementById('time-dur').textContent = formatTime(audio.duration);
});

audio.addEventListener('ended', () => {
  if (isRepeat) { audio.currentTime = 0; audio.play(); }
  else nextTrack();
});

audio.addEventListener('play', () => { isPlaying = true; document.getElementById('play-pause-btn').textContent = '⏸️'; });
audio.addEventListener('pause', () => { isPlaying = false; document.getElementById('play-pause-btn').textContent = '▶️'; });

function showLoader(id) {
  document.getElementById(id).innerHTML = '<div class="loader"><span></span><span></span><span></span></div>';
}

// Init favorites
fetch(`${BASE}/api/favorites`).then(r => r.json()).then(d => { favorites = d.favorites || []; });
</script>
</body>
</html>
